<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Establece el set de caracteres a UTF-8 -->
    <meta charset="UTF-8">
    <!-- Configuración inicial para la responsividad -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Titulo de la pagina -->
    <title>Google Clone</title>
    <!-- Iconos de google -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Importar la hoja de estilos -->
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google" class="logo">
        <div class="search-box">
            <span class="material-icons search-icon">search</span>
            <input type="text" id="search-input" placeholder="" autocomplete="off">
            <span class="material-icons mic-icon">mic</span>
        </div>
        <div class="buttons">
            <button id="btn-search">Buscar con Google</button>
            <button id="btn-lucky">Voy a tener suerte</button>
        </div>
    </div>
    <!-- Importar el script -->
    <script src="script.js"></script>
</body>
</html>
